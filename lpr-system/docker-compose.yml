version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:15
    container_name: lpr_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: lpr_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto run init.sql khi lần đầu tạo container
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  # MinIO - Object Storage
  minio:
    image: minio/minio
    container_name: lpr_minio
    restart: always
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # Cổng API
      - "9001:9001" # Cổng giao diện Web
    volumes:
      - minio_data:/data

  # Qdrant - Vector Database
  qdrant:
    image: qdrant/qdrant
    container_name: lpr_qdrant
    restart: always
    ports:
      - "6333:6333" 
    volumes:
      - qdrant_data:/qdrant/storage

  # RabbitMQ - Message Queue
  rabbitmq:
    image: rabbitmq:3-management
    container_name: lpr_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"   
      - "15672:15672" # Giao diện Web quản lý
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  rabbitmq_data: